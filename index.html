<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Prank Structure Overview</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
      background-color: #f5f5f5;
    }
    input {
      padding: 10px;
      font-size: 16px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>Prank Structure Overview</h1>

  <input type="text" id="caseId" placeholder="Enter Case ID">
  <br><br>
  <button onclick="checkCase()">Submit</button>

  <p id="error" style="color:red;"></p>

  <script>
    function checkCase() {
      let caseId = document.getElementById("caseId").value;

      if (caseId === "778249") {
        window.location.href = "structure.html";
      } else {
        document.getElementById("error").innerText = "Invalid Case ID";
      }
    }
  </script>

</body>
</html>
