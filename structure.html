<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Case 778249</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#eef2f7;
}

header {
  background:#0a3d91;
  color:white;
  padding:15px;
  text-align:center;
  font-size:18px;
}

.container {
  padding:20px;
}

.box {
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
  cursor:pointer;
}

.video-box {
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

button {
  padding:8px 12px;
  background:#0a3d91;
  color:white;
  border:none;
  cursor:pointer;
  margin-bottom:10px;
}
</style>
</head>

<body>

<header>
  📂 Case 778249 Documents and Videos
</header>

<div class="container">

<div class="box" onclick="showDocs()">
  📄 78 Documents
</div>

<p id="docMsg"></p>

<div id="videos"></div>

</div>

<script>

function showDocs(){
  document.getElementById("docMsg").innerHTML="Not available right now.";
}

let videoContainer = document.getElementById("videos");

for(let i=1;i<=6;i++){
  videoContainer.innerHTML += `
    <div class="video-box">
      <button onclick="playVideo(${i})">▶ Play Video ${i}</button>
      <div id="v${i}"></div>
    </div>
  `;
}

function playVideo(num){
  document.getElementById("v"+num).innerHTML = `
    <video width="100%" controls autoplay>
      <source src="${num}.MP4" type="video/mp4">
    </video>
  `;
}

</script>

</body>
</html>
