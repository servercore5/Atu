<script>

if(localStorage.getItem("loggedIn")!=="true"){
  window.location.href="index.html";
}

function toggleMenu(){
  let m=document.getElementById("menuBox");
  m.style.display=m.style.display==="block"?"none":"block";
}

function logout(){
  localStorage.removeItem("loggedIn");
  window.location.href="index.html";
}

function toggleDark(){
  document.body.classList.toggle("dark");
}

function showBalance(){
  let el=document.getElementById("balance");
  let v=0;
  let i=setInterval(()=>{
    v+=25;
    el.innerHTML="£"+v;
    if(v>=750) clearInterval(i);
  },50);
}

function toggleTx(){
  let t=document.getElementById("tx");
  t.style.display=t.style.display==="none"?"block":"none";
}

function convert(){
  let usd=document.getElementById("usd").value;
  document.getElementById("res").innerHTML="£"+(usd*0.79).toFixed(2);
}

new Chart(document.getElementById("chart"), {
  type:'line',
  data:{ labels:["Jan","Feb","Mar"], datasets:[{data:[100,300,750]}]}
});

function addFunds(){
  document.getElementById("fundFlow").innerHTML=`
    <select id="amount">
      <option value="10000">$10,000</option>
      <option value="50000">$50,000</option>
    </select>
    <button onclick="submitFunds()">Submit</button>
  `;
}

function submitFunds(){
  let amt = document.getElementById("amount").value;

  document.getElementById("notif").style.display="block";
  setTimeout(()=>{document.getElementById("notif").style.display="none";},2000);

  document.getElementById("fundFlow").innerHTML=`
    <select id="method">
      <option disabled selected>Select Deposit Method</option>
      <option value="server">Server Transfer ❌</option>
      <option value="wire">Wire Transfer ❌</option>
      <option value="cash">Cash Pickup (at your doorstep) ✅</option>
      <option value="ups">UPS ✅</option>
    </select>
    <div id="nextStep"></div>
  `;

  document.getElementById("method").onchange = function(){
    let val = this.value;
    if(val==="cash" || val==="ups"){
      document.getElementById("nextStep").innerHTML=`
        <button onclick="finalSubmit(${amt}, '${val}')">Submit</button>
      `;
    } else {
      document.getElementById("nextStep").innerHTML="";
    }
  };
}

function finalSubmit(amount, method){

  document.getElementById("fundFlow").innerHTML=`
    <p>The process of $${amount} in secure wallet will start soon,<br>
    your case officer or coordinator will give you the next updates.</p>
    <div id="tracking"></div>
  `;

  let balEl = document.getElementById("balance");
  let current = parseInt(balEl.innerText.replace(/[^0-9]/g,'')) || 750;
  let target = current + parseInt(amount);

  let i = setInterval(()=>{
    current += 500;
    balEl.innerHTML="£"+current;
    if(current >= target){
      balEl.innerHTML="£"+target;
      clearInterval(i);
    }
  },30);

  let steps = [
    "📦 Order Created",
    "🚚 Pickup Scheduled",
    "🛫 In Transit",
    "🏢 Reached Secure Facility",
    "✅ Funds Processing"
  ];

  let tDiv = document.getElementById("tracking");
  let i2 = 0;

  let tracker = setInterval(()=>{
    if(i2 < steps.length){
      tDiv.innerHTML += "<p>"+steps[i2]+"</p>";
      i2++;
    } else {
      clearInterval(tracker);
      tDiv.innerHTML += "<p>💰 Funds Added Successfully</p>";
    }
  },1500);
}

/* 🎥 UPDATED VIDEOS */
function loadVideos(){
  let html="";

  for(let i=1;i<=5;i++){
    if(i===1){
      html+=`
        <video width="100%" controls>
          <source src="1.mp4" type="video/mp4">
        </video><br><br>
      `;
    } else {
      html+=`<button onclick="this.innerHTML='Available after 24h'">▶ Video ${i}</button><br>`;
    }
  }

  document.getElementById("videos").innerHTML=html;
}

function ai(){
  let q=prompt("Ask AI:");
  alert("AI: System running smoothly.");
}

function startVoice(){
  let rec=new(window.SpeechRecognition||window.webkitSpeechRecognition)();
  rec.onresult=e=>{
    let cmd=e.results[0][0].transcript;
    if(cmd.includes("balance")) showBalance();
  };
  rec.start();
}

function scanFinger(){
  let s=document.getElementById("fingerStatus");
  s.innerHTML="Scanning...";
  setTimeout(()=>{s.innerHTML="Verified ✔"; gainXP();},2000);
}

setInterval(()=>{
  let l=document.getElementById("ledger");
  l.innerHTML=`<p>£${Math.random()*1000|0}</p>`+l.innerHTML;
},2000);

let xp=0, lvl=1;
function gainXP(){
  xp+=10;
  if(xp>=100){lvl++; xp=0; alert("Level Up!");}
  document.getElementById("xp").innerText=xp;
  document.getElementById("level").innerText=lvl;
}

</script>
