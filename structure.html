<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FTC secure wallet</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:Arial; background:#eef2f7; transition:0.3s;}
.dark { background:#121212; color:white;}

header, footer {
  background:#0a3d91;
  color:white;
  padding:15px;
}

header img { height:40px; }

.menu { position:absolute; right:20px; top:15px; }

.dropdown {
  display:none;
  position:absolute;
  right:0;
  background:white;
  width:220px;
}

.dropdown div {
  padding:10px;
  border-bottom:1px solid #ddd;
  color:black;
  cursor:pointer;
}

.container { padding:20px; }

.box {
  background:white;
  padding:20px;
  border-radius:10px;
  margin:15px 0;
}

.dark .box { background:#1e1e1e; }

button {
  padding:10px;
  margin-top:10px;
  background:#0a3d91;
  color:white;
  border:none;
  cursor:pointer;
}

#assistant {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#0a3d91;
  color:white;
  padding:15px;
  border-radius:50%;
  cursor:pointer;
}

.toggle {
  position:fixed;
  top:20px;
  left:20px;
  cursor:pointer;
}

/* CARD */
.card { width:300px; height:180px; perspective:1000px; }
.card-inner { width:100%; height:100%; transition:0.6s; transform-style:preserve-3d; }
.card:hover .card-inner { transform:rotateY(180deg); }

.card-front, .card-back {
  position:absolute; width:100%; height:100%;
  backface-visibility:hidden;
  border-radius:10px;
  padding:20px;
  color:white;
}

.card-front { background:#0a3d91; }
.card-back { background:#222; transform:rotateY(180deg); }

/* Satellite */
#satellite {
  position:fixed;
  top:50%;
  left:-50px;
  font-size:30px;
  animation:fly 10s linear infinite;
}

@keyframes fly {
  from { left:-50px; }
  to { left:110%; }
}

/* Notification */
#notif {
  position:fixed;
  top:20px;
  right:20px;
  background:green;
  color:white;
  padding:10px;
  display:none;
}
</style>
</head>

<body>

<header>
  <img src="125.png"> Federal Trade Commission
  <div class="menu">
    <button onclick="toggleMenu()">☰</button>
    <div class="dropdown" id="menuBox">
      <div>👤 Profile</div>
      <div>Checkings</div>
      <div>Savings</div>
      <div>Investments</div>
      <div>Credit Card</div>
      <div>Loans</div>
      <div onclick="logout()">🚪 Sign Out</div>
    </div>
  </div>
</header>

<div class="toggle" onclick="toggleDark()">🌙</div>
<div id="satellite">🛰️💷</div>

<div class="container">

<div class="card">
  <div class="card-inner">
    <div class="card-front">💳 Premium Card<br><br>1200 3478 6766 7776</div>
    <div class="card-back">CVV: 987<br>Exp: 12/28</div>
  </div>
</div>

<div class="box" onclick="showBalance()">
  Account: 13007677876609
  <h2 id="balance">$51,000.00</h2>
</div>

<!-- TRANSACTIONS -->
<div class="box">
<button onclick="toggleTx()">View Transactions</button>

<div id="tx" style="display:none; margin-top:15px;">
<select id="filter" onchange="filterTx()" style="width:100%; padding:10px;">
<option value="all">All</option>
<option value="deposit">Deposits</option>
<option value="comp">Compensation</option>
<option value="transfer">Transfers</option>
</select>

<input id="search" onkeyup="filterTx()" placeholder="Search..." style="width:100%; padding:10px; margin-top:10px;">
<button onclick="downloadTx()">📥 Download</button>

<div id="txList"></div>
</div>
</div>

<!-- TRANSFER -->
<div class="box">
<h3>Transfer Money</h3>
<button onclick="openTransfer()">Start Transfer</button>
<div id="transferFlow"></div>
</div>

</div>

<div id="notif">Success</div>

<script>

// TRANSACTIONS DATA
let transactions=[
{type:"deposit",name:"Cash Deposit",date:"12-04-2026",amount:50000},
{type:"comp",name:"Case Compensation",date:"11-04-2026",amount:250}
];

// RENDER
function renderTx(list){
let html="";
list.forEach(t=>{
let color=t.amount<0?"red":"green";
let sign=t.amount<0?"-":"+";
html+=`<div style="display:flex;justify-content:space-between;padding:10px;">
<div>${t.name}<br><small>${t.date}</small></div>
<div style="color:${color};font-weight:bold;">${sign}$${Math.abs(t.amount)}</div>
</div><hr>`;
});
document.getElementById("txList").innerHTML=html;
}

// FILTER
function filterTx(){
let f=document.getElementById("filter").value;
let s=document.getElementById("search").value.toLowerCase();

let filtered=transactions.filter(t=>{
return (f==="all"||t.type===f) &&
(t.name.toLowerCase().includes(s)||t.date.includes(s));
});
renderTx(filtered);
}

// DOWNLOAD
function downloadTx(){
let content="";
transactions.forEach(t=>{
content+=`${t.name} ${t.date} ${t.amount}\n`;
});
let blob=new Blob([content]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="transactions.txt";
a.click();
}

// TRANSFER FLOW
function openTransfer(){
document.getElementById("transferFlow").innerHTML=`
<input id="name" placeholder="Name"><br>
<input id="amount" type="number" placeholder="Amount"><br>
<input id="date" type="datetime-local"><br>
<button onclick="schedulePayment()">Schedule</button>
`;
}

function schedulePayment(){
let name=document.getElementById("name").value;
let amount=document.getElementById("amount").value;
let date=document.getElementById("date").value;

let delay=new Date(date)-new Date();

setTimeout(()=>{
transactions.unshift({
type:"transfer",
name:"Transfer to "+name,
date:new Date().toLocaleString(),
amount:-amount
});
renderTx(transactions);

let n=document.getElementById("notif");
n.style.display="block";
n.innerText="Payment Sent!";
setTimeout(()=>n.style.display="none",3000);

},delay);

alert("Payment Scheduled");
}

function toggleTx(){
let t=document.getElementById("tx");
t.style.display=t.style.display==="none"?"block":"none";
}

renderTx(transactions);

</script>

</body>
</html>
